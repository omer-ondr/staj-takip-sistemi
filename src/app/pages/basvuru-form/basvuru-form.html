<div class="container mx-auto p-6 max-w-2xl mt-10">
  <div class="bg-white rounded-lg shadow-lg p-8 border-t-4 border-blue-600">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">{{ sayfaBasligi }}</h2>

    <form [formGroup]="basvuruForm" (ngSubmit)="kaydet()" class="space-y-6">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Şirket Adı</label>
        <input type="text" formControlName="sirketAdi" placeholder="Örn: ASELSAN, HAVELSAN"
               class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Pozisyon / Rol</label>
        <input type="text" formControlName="pozisyon" placeholder="Örn: Yazılım Stajyeri, Gömülü Sistemler"
               class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Başvuru Durumu</label>
          <select formControlName="durum" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-white">
            <option value="Beklemede">Beklemede</option>
            <option value="Mülakat">Mülakat Sürecinde</option>
            <option value="Kabul">Kabul Edildi</option>
            <option value="Red">Reddedildi</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Başvuru Tarihi</label>
          <input type="date" formControlName="basvuruTarihi"
                 class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Ek Notlar (İsteğe Bağlı)</label>
        <textarea formControlName="notlar" rows="3" placeholder="Mülakat linki, istenen belgeler vb."
                  class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"></textarea>
      </div>

      <div class="flex justify-end space-x-4 mt-8 pt-4 border-t">
        <button type="button" routerLink="/"
                class="px-6 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 transition font-medium">
          İptal
        </button>
        <button type="submit" [disabled]="basvuruForm.invalid"
                class="px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition font-medium disabled:bg-blue-300 disabled:cursor-not-allowed shadow-sm">
          Kaydet
        </button>
      </div>

    </form>
  </div>
</div>
